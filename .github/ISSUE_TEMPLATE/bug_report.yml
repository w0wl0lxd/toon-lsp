name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal TOON/JSON input and command(s) that trigger it.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: toon-lsp version
      description: Output of `toon-lsp --version`
    validations:
      required: true
  - type: input
    id: editor
    attributes:
      label: Editor (if this is an LSP issue)
      description: VS Code, Neovim, Zed, etc. — leave blank for CLI-only bugs.
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
