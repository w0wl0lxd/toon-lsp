# ── Build Acceleration ──────────────────────────────────────────────
#
# sccache:   Compiler cache — caches compilation artifacts locally to
#            speed up repeated builds (cargo check, cargo test, etc.)
# mold:      High-performance linker — drop-in replacement for ld that
#            links 5-10x faster (Linux only)
# cranelift: Fast codegen backend — compiles 2-3x faster than LLVM for
#            development builds at the cost of slightly worse runtime
#            performance (requires nightly)
#
# Usage:
#   Standard dev build:       cargo build              (sccache + mold)
#   Fast dev build:           rustup run nightly cargo build --profile dev-fast
#   Release build:            cargo build --release    (sccache + mold)

# ── Environment Variables ───────────────────────────────────────────
# Set CARGO_TARGET_DIR to use /mnt/build for faster builds
# Set SCCACHE_DIR to use /mnt/build/sccache for cached artifacts
[env]
CARGO_TARGET_DIR = { value = "/mnt/build/cargo-target/toon-lsp", relative = false }
SCCACHE_DIR = { value = "/mnt/build/sccache/toon-lsp", relative = false }

# ── Compiler Cache ──────────────────────────────────────────────────
[build]
# Route all rustc invocations through sccache for compilation caching
rustc-wrapper = "sccache"

# ── Fast Linker ─────────────────────────────────────────────────────
# Use mold via clang on Linux — significantly faster linking
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# ── Unstable Feature Flags ──────────────────────────────────────────
# Required to use codegen-backend in profiles (nightly only)
[unstable]
codegen-backend = true

# ── Development Profiles ────────────────────────────────────────────
# Fast development build using Cranelift codegen backend
# Compiles ~2-3x faster than LLVM; ideal for rapid iteration
[profile.dev-fast]
inherits = "dev"
codegen-backend = "cranelift"
